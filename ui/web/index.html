<html>

<head>
    <title>da_dev</title>
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./assets/index.css">
    <script type="module" crossorigin src="./assets/index.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <!-- <script src="https://kit.fontawesome.com/4e5717b1f7.js" crossorigin="anonymous" ></script> -->
    <script src="script.js" type="text/javascript"></script>
</head>

<body>
    <div id="gizmo"></div>
    <div id="objSelHud" style="display:none;">
        <div id="crosshair" class="inactive">+</div>
    </div>
    <div id="devMenu" class="dev">
        <ul id="menuOptions" class="">
            <!-- <li> <div class="value"> tp</div><div class="key">t</div> </li> -->
            <!-- <li> <div class="value"> entity</div><div class="key">e</div> </li> -->
            <!-- <li> <div class="value"> misc</div><div class="key">o</div> </li> -->
        </ul>
        <ul id="devOptions" class="">
            <!-- <li> <div class="value">v3 cpy</div><div class="key">3</div> </li> -->
            <!-- <li> <div class="value">v4 cpy</div><div class="key">4</div> </li> -->
            <!-- <li> <div class="value">revive</div><div class="key">r</div> </li> -->
        </ul>
    </div>
    <div id="animControlOptions" class="dev">
        <ul id="animControl" class="row">
            <li id="animSettings" style="display:none;">
                <div id="button-search" class="control" tabindex="2" role="button" aria-pressed="false"
                    onclick="toggleOption('control-search');"></div>
                <div id="button-timings" class="control" tabindex="3" role="button" aria-pressed="false"
                    onclick="toggleOption('control-timings');"></div>
                <div id="button-flags" class="control" tabindex="4" role="button" aria-pressed="false"
                    onclick="toggleOption('control-flags');"></div>
                <div id="button-entity" class="control" tabindex="5" role="button" aria-pressed="false"
                    onclick="toggleOption('control-entity');"></div>
            </li>
            <li id="anim-control-options">
                <div id="button-settings" class="control" tabindex="1" role="button" aria-pressed="false"
                    onclick="toggleOption('control-settings');"></div>
                <div id="button-play" class="control" tabindex="5" role="button" aria-pressed="false"
                    onclick="toggleOption('control-play');"></div>
                <div id="button-stop" class="control" tabindex="5" role="button" aria-pressed="false"
                    onclick="toggleOption('control-stop');"></div>
                <div id="button-repeat" class="control" tabindex="5" role="button" aria-pressed="false"
                    onclick="toggleOption('control-repeat');"></div>
            </li>
        </ul>
    </div>
    <div id="animSearchLists" class="dev">
        <div id="animDictList">
        </div>
        <div id="animList">
        </div>
    </div>
    <div id="animSearchField" class="dev">
        <div class="entryLabel" style="width:auto;"></div>
        <div id="valueAnimSearch" class="entryField" tabindex="2" contenteditable="true"></div>
    </div>
    <div id="animTimingsOptions" class="dev">
        <ul id="animTimings">
            <li>
                <div class="entryLabel">Blend-In</div>
                <div id="timing-BlendIn" class="entryField" contenteditable="true" tabindex="3">1.0</div>
            </li>
            <li>
                <div class="entryLabel">Blend-Out</div>
                <div class="entryField" contenteditable="true" tabindex="3">1.0</div>
            </li>
            <li>
                <div class="entryLabel">Playback</div>
                <div class="entryField" contenteditable="true" tabindex="3">0</div>
            </li>
            <li>
                <div class="entryLabel">Duration</div>
                <div class="entryField" contenteditable="true" tabindex="3">-1</div>
            </li>
        </ul>
    </div>
    <div id="animFlagsOptions" class="dev">
    </div>
    <div id="animEntityOptions" class="dev">
        <ul id="animEntity">
            <li>
                <div class="entryLabel">Entity</div>
                <div class="entryField" contenteditable="true" tabindex="5"></div>
            </li>
        </ul>
    </div>
    <div id="activeAnimDisplay" class="dev">
        <ul id="animActive">
            <li>
                <div class="entryLabel">animDict</div>
                <div id="activeAnimDict" class="entryField"></div>
            </li>
            <li>
                <div class="entryLabel">anim</div>
                <div id="activeAnimName" class="entryField"></div>
            </li>
        </ul>
    </div>

    <div id="copyField">
        <div id="copyAnimDict" style="display:none;"></div>
        <div id="copyAnim" style="display:none;"></div>
    </div>
    </body>
</html>
